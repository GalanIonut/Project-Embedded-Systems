name: CI

on:
  pull_request:
    branches:
      - "**"

jobs:
  build:
    name: Build (avr-gcc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-avr binutils-avr avr-libc make

      - name: Build project
        run: make all BOARD=nano

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Run all unit tests
        run: make test
